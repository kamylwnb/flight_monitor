short_description: "War Thunder flight parameters monitor with BLE connectivity"

description: |
  Real-time flight monitoring application for Flipper Zero with War Thunder integration.
  Features live display of altitude, speed, vertical speed, throttle, flaps, gear status,
  and aircraft orientation. Includes configurable alarm system with altitude warnings,
  gear retraction alerts, stall/overspeed protection, and engine failure detection.
  Professional settings menu with persistent configuration and automatic crash detection.

